ALL_LEADS.forEach(l=>{st[l.id]=l.status;ag[l.id]=l.agent||'';});

const KAT_CFG = [
  {k:'Klinike & Estetika',cls:'kb-t',col:'#8b2045',bg:'#fde8f0'},
  {k:'Moda & Nakit',cls:'kb-m',col:'#1a4fa0',bg:'#e8f0fd'},
  {k:'Proizvodnja',cls:'kb-p',col:'#1a6040',bg:'#e8fdf0'},
  {k:'Udruženja & Komore',cls:'kb-u',col:'#7a5e10',bg:'#fdf5e0'},
  {k:'Ostalo',cls:'kb-o',col:'#888',bg:'#f5f5f5'},
];

function kbCls(k){return(KAT_CFG.find(c=>c.k===k)||{cls:'kb-o'}).cls;}
function sCls(s){
  return s==='Kontaktirana'?'ss-ko':s==='Zainteresovana'?'ss-za':s==='Odbijena'?'ss-od':s==='Potvrđena'?'ss-po':'ss-nk';
}
function aCls(a){return a==='Tijana'?'at':a==='Azra'?'az':a==='Slađana'?'asl':a==='Alena'?'aal':'';}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show';
  setTimeout(()=>el.className='toast',2500);
}

function updateSummary(){
  const tot=ALL_LEADS.length;
  const ko=Object.values(st).filter(s=>s!=='Nije kontaktirana'&&s!=='').length;
  const za=Object.values(st).filter(s=>s==='Zainteresovana'||s==='Potvrđena').length;
  const nk=tot-ko;
  let h=`
    <div class="sum-cell" style="background:#f5f4f0">
      <div class="sum-num" style="color:#1a1a1a">${tot}</div>
      <div class="sum-lbl">Ukupno leadova</div>
    </div>
    <div class="sum-cell" style="background:#fdeaea">
      <div class="sum-num" style="color:#922">${nk}</div>
      <div class="sum-lbl">Nije kontaktirana</div>
    </div>
    <div class="sum-cell" style="background:#e8f0fd">
      <div class="sum-num" style="color:#1a5fa0">${ko}</div>
      <div class="sum-lbl">Kontaktirano</div>
    </div>
    <div class="sum-cell" style="background:#e8fdf0">
      <div class="sum-num" style="color:#1e6b42">${za}</div>
      <div class="sum-lbl">Zainteresovane</div>
    </div>`;
  KAT_CFG.forEach(c=>{
    const n=ALL_LEADS.filter(l=>l.kat===c.k).length;
    const nko=ALL_LEADS.filter(l=>l.kat===c.k&&st[l.id]!=='Nije kontaktirana').length;
    h+=`<div class="sum-cell" style="background:${c.bg}">
      <div class="sum-num" style="color:${c.col}">${n}</div>
      <div class="sum-lbl">${c.k}</div>
      ${nko>0?`<div class="sum-sub" style="color:${c.col}">${nko} kontakt.</div>`:''}
    </div>`;
  });
  document.getElementById('sgrid').innerHTML=h;
}

const WEBHOOK='https://discord.com/api/webhooks/1490621532274294965/aqA5D7ZhmJbtweuAxzdphmsL6p6OrvnAsoOOB0Hs6s7kphHRE0tJLE_j1US5lKxPeL7y';

const EMOJI={
  'Kontaktirana':'📞',
  'Zainteresovana':'🔥',

  'Nije kontaktirana':'⚪'

  'Kontaktirana':3447003,
  'Zainteresovana':16744272,
  'Potvrđena':3066993,
  'Odbijena':15158332,
  'Nije kontaktirana':9807270

window.markS=function(id,sel){
  const prev=st[id];
  const novo=sel.value;
  st[id]=novo;
  sel.className='ss '+sCls(novo);
  toast((EMOJI[novo]||'')+ ' Status: '+novo);
  updateSummary();

  // Pošalji Discord notifikaciju samo ako se status promijenio i nije "Nije kontaktirana"
  if(novo!==prev && novo!=='Nije kontaktirana'){
    const lead=ALL_LEADS.find(l=>l.id===id)||{};
    const agent=ag[id]||'Nepoznat';
    const ko=lead.ko||'—';
    const mail=lead.mail&&!lead.mail.includes('@top20bih')&&!lead.mail.includes('@placeholder')?lead.mail:'—';

    fetch(WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        embeds:[{
          title: EMOJI[novo]+' '+novo+' — '+ko,
          color: BOJA[novo]||7506394,
          fields:[
            {name:'🏢 Kompanija',value:ko,inline:true},
            {name:'👤 Agent',value:agent,inline:true},
            {name:'📊 Status',value:prev+' → **'+novo+'**',inline:false},
            {name:'📧 Mail',value:mail,inline:true},
          ],
          footer:{text:'Women 100 Target Lista • '+new Date().toLocaleString('bs')},
          thumbnail:{url:'https://cdn.discordapp.com/embed/avatars/0.png'}
        }]
      })
    }).catch(()=>{});
  }
};
window.markA=function(id,sel){
  ag[id]=sel.value;sel.className='as '+aCls(sel.value);
  if(sel.value)toast('Dodijeljeno: '+sel.value);
};

function render(){
  const srch=document.getElementById('srch').value.toLowerCase();
  const fk=document.getElementById('fk').value;
  const fa=document.getElementById('fa').value;
  const fs=document.getElementById('fs').value;

  const filtered=ALL_LEADS.filter(l=>{
    if(srch&&!l.ko.toLowerCase().includes(srch)&&!(l.ime||'').toLowerCase().includes(srch)&&!l.mail.toLowerCase().includes(srch))return false;
    if(fk&&l.kat!==fk)return false;
    if(fa&&ag[l.id]!==fa)return false;
    if(fs&&st[l.id]!==fs)return false;
    return true;
  });

  const grp={};KAT_CFG.forEach(c=>grp[c.k]=[]);
  filtered.forEach(l=>{if(grp[l.kat])grp[l.kat].push(l);else{if(!grp['Ostalo'])grp['Ostalo']=[];grp['Ostalo'].push(l);}});

  let h='';
  KAT_CFG.forEach(cfg=>{
    const items=grp[cfg.k];if(!items||!items.length)return;
    h+=`<div class="sh">${cfg.k} <span class="sc">${items.length}</span></div>`;
    h+=`<div class="tw"><table><thead><tr>
      <th></th><th>Kompanija</th><th>Kontakt</th><th>Mail</th><th>Telefon</th><th>Napomena</th><th>Agent</th><th>Status</th>
    </tr></thead><tbody>`;
    items.forEach((l,i)=>{
      const isPrio=l.priority;
      h+=`<tr>
        <td>${isPrio?'<span class="star">★</span>':''}</td>
        <td class="co">${l.ko}</td>
        <td style="color:#555;font-size:11px">${l.ime||''}</td>
        <td class="ml"><a href="mailto:${l.mail}">${l.mail.includes('@top20bih')?'—':l.mail}</a></td>
        <td class="tel">${l.tel||''}</td>
        <td class="note" title="${(l.napomena||'').replace(/"/g,"'")}">${l.napomena||''}</td>
        <td><select class="as ${aCls(ag[l.id])}" onchange="markA(${l.id},this)">
          <option value="">—</option>
          <option ${ag[l.id]==='Tijana'?'selected':''}>Tijana</option>
          <option ${ag[l.id]==='Azra'?'selected':''}>Azra</option>
          <option ${ag[l.id]==='Slađana'?'selected':''}>Slađana</option>
          <option ${ag[l.id]==='Alena'?'selected':''}>Alena</option>
        </select></td>
        <td><select class="ss ${sCls(st[l.id])}" onchange="markS(${l.id},this)">
          <option ${st[l.id]==='Nije kontaktirana'?'selected':''}>Nije kontaktirana</option>
          <option ${st[l.id]==='Kontaktirana'?'selected':''}>Kontaktirana</option>
          <option ${st[l.id]==='Zainteresovana'?'selected':''}>Zainteresovana</option>
          <option ${st[l.id]==='Odbijena'?'selected':''}>Odbijena</option>
          <option ${st[l.id]==='Potvrđena'?'selected':''}>Potvrđena</option>
        </select></td>
      </tr>`;
    });
    h+='</tbody></table></div>';
  });
  if(!h)h='<div class="empty">Nema rezultata.</div>';
  document.getElementById('board').innerHTML=h;
  updateSummary();
}

function resetF(){
  document.getElementById('srch').value='';
  document.getElementById('fk').value='';
  document.getElementById('fa').value='';
  document.getElementById('fs').value='';
  render();
}
render();
</script>
